spring:

  application:
    version: 0.0.1
    name: hd-platform

  profiles:
    active: local

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate

server:

  port: 8080

management:

  endpoints:
    web:
      exposure:
        include: health,info

springdoc:

  swagger-ui:
    path: /swagger-ui.html

logging:

  level:
    root: INFO