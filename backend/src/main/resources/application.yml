spring:

  application:
    version: 0.0.1
    name: hd-platform

  profiles:
    active: local

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate

server:

  port: 8080

management:

  endpoints:
    web:
      exposure:
        include: health,info

springdoc:

  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

logging:

  level:
    root: INFO

hd-platform:
  media:
    root: ${MEDIA_STORAGE_ROOT:./data/media}
    max-size-bytes: ${MEDIA_MAX_SIZE_BYTES:10485760}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
      - application/pdf
  security:
    jwt:
      # Identity provider endpoint containing public signing keys.
      jwk-set-uri: ${JWT_JWK_SET_URI}
      issuer: ${JWT_ISSUER}
      audience: ${JWT_AUDIENCE:hd-platform-api}
      key-id: ${JWT_KEY_ID:hd-platform-1}
      signing-private-key: ${JWT_SIGNING_PRIVATE_KEY}
      signing-public-key: ${JWT_SIGNING_PUBLIC_KEY}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:30d}
    workspace-exchange-key: ${WORKSPACE_EXCHANGE_KEY:}
  multitenancy:
    # Keep disabled in production unless a trusted gateway strips and sets this header.
    site-key-header-enabled: false
